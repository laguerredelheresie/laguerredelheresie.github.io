<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page déplacée - La Guerre de l'Hérésie</title>
    <script>
      (function () {
        var canonicalOrigin = "https://laguerredelheresie.com";
        var path = window.location.pathname;
        var targetPath = path;

        if (path.endsWith(".php")) {
          targetPath = path.slice(0, -4) + ".html";
        }

        if (window.location.hostname === "laguerredelheresie.github.io" || targetPath !== path) {
          window.location.replace(canonicalOrigin + targetPath + window.location.search + window.location.hash);
        }
      }());
    </script>
    <style>
      body { font-family: system-ui, sans-serif; margin: 3rem; line-height: 1.5; }
    </style>
  </head>
  <body>
    <h1>Page introuvable</h1>
    <p>Cette page a peut-être été déplacée lors de la migration vers le domaine officiel.</p>
    <p><a href="https://laguerredelheresie.com/">Retour à l'accueil</a></p>
  </body>
</html>
